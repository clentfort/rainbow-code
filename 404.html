<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Rainbow Code</title>
    <script>
      // SPA GH-Pages redirect: rewrite the path into a query string that
      // index.html restores into history before React boots.
      (function () {
        var segments = 1; // base path depth: /rainbow-code/
        var l = window.location;
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + segments).join('/') + '/?p=/' +
          l.pathname.split('/').slice(1 + segments).join('/').replace(/&/g, '~and~') +
          (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>
